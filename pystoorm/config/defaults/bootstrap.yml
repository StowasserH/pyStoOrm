# pyStoOrm Bootstrap Configuration (Global Defaults)
# This file contains the default output templates and logging configuration

# Logging Configuration
logging:
  level: INFO  # DEBUG, INFO, WARN, ERROR
  format: "%(name)s - %(levelname)s - %(message)s"

# Author/Generator Info
author: "Generated by pyStoOrm"

# Output Templates
# Note: All templates are optional (enabled: false by default)
# User can override in their project.yml to enable specific templates
output:
  # Python ORM Model - generates one file per table
  - from: ./pystoorm/templates/python/model.py.template
    to: ${output_dir}/models/[table].py
    enabled: false
    modus: table

  # Python Repository - generates one file per table
  - from: ./pystoorm/templates/python/repository.py.template
    to: ${output_dir}/repositories/[table]_repository.py
    enabled: false
    modus: table

  # ER-Diagram (Graphviz DOT format) - generates one file per database connection
  - from: ./pystoorm/templates/erd/graphviz.template
    to: ${output_dir}/erd/[connection]_schema.dot
    enabled: false
    modus: schema
