# pyStoOrm Style Guide - Python PEP8
# Defines how generated Python code should be styled and formatted

style:
  # CLASS NAMING
  class_naming:
    case: "PascalCase"              # PascalCase is standard for Python classes
    suffix: "Model"                 # Optional suffix: "UserModel" instead of "User"
    prefix: ""                      # Optional prefix: "C" → "CUser"

  # METHOD NAMING
  method_naming:
    case: "snake_case"              # Python standard for method names
    get_method_prefix: "get_"       # get_name() instead of name()
    set_method_prefix: "set_"       # set_name() instead of name=
    is_method_prefix: "is_"         # is_active() for boolean properties

  # CONSTANT NAMING
  constant_naming:
    case: "UPPER_SNAKE_CASE"        # Python standard for constants

  # CODE FORMATTING
  formatting:
    indent: 4                       # Number of spaces for indentation
    line_length: 88                 # Black/PEP8 standard
    use_type_hints: true            # Use type hints: user: str = ""
    use_docstrings: "pep257"        # pep257, google, numpy, or none

  # IMPORTS
  imports:
    sort_imports: true              # Sort imports (isort compatible)
    group_imports: true             # Group: stdlib, 3rd-party, local

  # COMMENTS
  comments:
    include_generated_notice: true  # Add "# Generated by pyStoOrm"
    include_timestamp: false         # Add generation timestamp
