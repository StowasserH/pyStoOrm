connections:
  - connection: classicmodels
    database: classicmodels.db
    connector: pystoorm.database.sqliteconnector.SqliteConnector

output_dir: generated

# Optional: Configure custom base classes
# Uncomment to use custom base classes instead of the default ones
# base_classes:
#   model:
#     class_name: MyBaseModel
#     import_from: custom_bases.my_model
#   repository:
#     class_name: MyRepository
#     import_from: custom_bases.my_repository
#   builder:
#     class_name: MyBuilder
#     import_from: custom_bases.my_builder

output:
  - from: ../../pystoorm/templates/python/model.py.template
    to: generated/models/[table].py
    enabled: true
    modus: table

  - from: ../../pystoorm/templates/python/repository.py.template
    to: generated/repositories/[table]_repository.py
    enabled: true
    modus: table

  - from: ../../pystoorm/templates/python/sqlbuilder.py.template
    to: generated/builders/[table]_builder.py
    enabled: true
    modus: table

  - from: ../../pystoorm/templates/erd/graphviz.template
    to: generated/erd/[connection]_schema.dot
    enabled: true
    modus: schema
